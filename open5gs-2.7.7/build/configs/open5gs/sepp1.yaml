logger:
  file:
    path: /home/ledoux/open5gs-2.7.7/install/var/log/open5gs/sepp1.log
#  level: info   # fatal|error|warn|info(default)|debug|trace

global:
  max:
    ue: 1024  # The number of UE can be increased depending on memory size.
#    peer: 64

sepp:
  default:
    tls:
      server:
        private_key: /home/ledoux/open5gs-2.7.7/install/etc/open5gs/tls/sepp1.key
        cert: /home/ledoux/open5gs-2.7.7/install/etc/open5gs/tls/sepp1.crt
      client:
        cacert: /home/ledoux/open5gs-2.7.7/install/etc/open5gs/tls/ca.crt
  sbi:
    server:
      - address: 127.0.1.250
        port: 8888
    client:
#      nrf:
#        - uri: http://127.0.0.10:8888
      scp:
        - uri: http://127.0.0.200:8888
  n32:
    server:
      - sender: sepp1.localdomain
        scheme: https
        address: 127.0.1.251
        port: 8888
        n32f:
          scheme: https
          address: 127.0.1.252
          port: 8888
    client:
      sepp:
        - receiver: sepp2.localdomain
          uri: https://sepp2.localdomain:8888
          resolve: 127.0.2.251
          n32f:
            uri: https://sepp2.localdomain:8888
            resolve: 127.0.2.252

